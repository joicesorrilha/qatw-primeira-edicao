name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 1: Sobe PRIMEIRO os alicerces (Banco e Redis) para dar tempo de eles iniciarem
      - name: Subir Base da Infraestrutura (DB e Redis)
        run: |
          docker compose up -d db redis

      # Passo 2: Aguarda 15 segundos para o Redis e o Postgres estarem saudáveis na rede
      - name: Aguardar Base Estabilizar
        run: sleep 15

      # Passo 3: Agora sim, com o Redis online, subimos as APIs e o Frontend com segurança
      - name: Subir Aplicação (APIs e Frontend)
        run: |
          docker compose up -d paybank-ms-auth paybank-ms-email paybank-mf-auth

      # Passo 4: Mais 10 segundos apenas para as APIs completarem o handshake inicial
      - name: Aguardar Aplicação Iniciar
        run: sleep 10

      # Passo 5: Configura o ambiente de testes na máquina do GitHub Actions
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configurar Java 21 (Para o Allure)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Passo 6: Instala dependências e executa os testes do Playwright
      - name: Instalar Dependências do Projeto
        run: npm ci

      - name: Instalar Navegadores do Playwright
        run: npx playwright install --with-deps

      - name: Executar Testes E2E
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test

      # Passo 7: Guarda os resultados do Allure
      - name: Guardar Resultados do Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 10